name: Build & Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="ghcr.io/${{ github.repository }}:latest"
            LOCAL_TAG="furniture-xhl2yk:latest"
            SERVICE="furniture-xhl2yk"

            docker pull "$IMAGE"
            docker tag "$IMAGE" "$LOCAL_TAG"

            # Get correct Postgres host from running container
            PG_HOST=$(docker ps --filter name=mazaya-postgres --format '{{.Names}}' | head -1)
            PG_HOST="${PG_HOST%.*}"  # strip .1.xxx suffix
            PG_HOST="${PG_HOST%%.*}"
            PG_HOST="${PG_HOST:-mazaya-postgres}"

            DATABASE_URL="postgres://mazaya:mazaya_pass_123@${PG_HOST}:5432/mazaya_factory"

            # Update Swarm service with env var and new image
            docker service update \
              --image "$LOCAL_TAG" \
              --env-add "DATABASE_URL=$DATABASE_URL" \
              --force \
              "$SERVICE" 2>/dev/null || echo "SERVICE_UPDATE_FAILED"

