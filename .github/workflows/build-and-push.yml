name: Build & Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Rebuild بدون cache (للحالات العنيدة)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache بيتعطّل لو شغّلنا الـ workflow يدويًا مع no_cache=true
          cache-from: ${{ github.event.inputs.no_cache == 'true' && '' || 'type=gha' }}
          cache-to: ${{ github.event.inputs.no_cache == 'true' && '' || 'type=gha,mode=max' }}
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}

      # The actual deploy is handled by .github/workflows/deploy.yml
      # (self-hosted runner on the production server).
      # This job only builds + pushes the image.


