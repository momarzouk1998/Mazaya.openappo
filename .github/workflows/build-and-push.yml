name: Build & Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="ghcr.io/${{ github.repository }}:latest"
            CONTAINER="furniture-xhl2yk"

            docker pull "$IMAGE"

            NET="bridge"
            if docker inspect "$CONTAINER" > /tmp/ci.json 2>/dev/null; then
              NET=$(python3 -c 'import json;d=json.load(open("/tmp/ci.json"));print(list(d[0]["NetworkSettings"]["Networks"].keys())[0])' 2>/dev/null || echo bridge)
              python3 -c 'import json,sys;d=json.load(open("/tmp/ci.json"));[print(e) for e in d[0]["Config"]["Env"]]' > /tmp/ci.env 2>/dev/null || true
            fi

            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            ENVFILE="/tmp/ci.env"
            test -f "$ENVFILE" || ENVFILE="/dev/null"

            docker run -d --name "$CONTAINER" --restart unless-stopped \
              --network "${NET:-bridge}" \
              -p 3000:3000 \
              --env-file "$ENVFILE" \
              "$IMAGE"

            rm -f /tmp/ci.json /tmp/ci.env

